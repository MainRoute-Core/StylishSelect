em;} p{ color: var(--muted); margin-bottom: 2rem;} .actions{ display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;} .btn{ display: inline-flex; align-items: center; justify-content: center; text-decoration: none; padding: .85rem 1.4rem; border-radius: 12px; font-weight: 600; transition: .2s;} .btn-primary{ background: var(--primary); color: #fff;} .btn-primary:hover{ background: var(--primary-hover);} .btn-secondary{ border: 1px solid var(--border); color: var(--text);} .btn-secondary:hover{ border-color: var(--primary); color: var(--primary);} footer{ padding: 22px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-size: .95rem;} footer a{ color: var(--primary); text-decoration: none;} </style></head><body><nav class="ss-nav"><div class="navbar"><a href="./" class="logo"><img src="./src/512.png" alt="StylishSelect">StylishSelect </a></div></nav><main><section class="card"><div class="error">404</div><h1>Page Not Found</h1><p>The page you're looking for doesn't exist, may have been moved, or the URL is incorrect. </p><div class="actions"><a href="./" class="btn btn-primary">Go Home</a><a href="javascript:history.back()" class="btn btn-secondary">Go Back</a></div></section></main><footer style="margin-top: 90px;border-top: 1px solid var(--border);padding: 26px;text-align: center;color: var(--muted);">© <span id="year">2026</span><a style="color: var(--primary);text-decoration: none;" href="https://MainRoute-Core.github.io">MainRoute Core</a>• All Rights Reserved. • <a style="color: var(--primary);text-decoration: none;" href="https://Pro-Bandey.github.io">Pro Bandey</a></footer><script>document.getElementById('year').textContent=new Date().getFullYear(); </script></body></html>
